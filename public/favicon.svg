<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Diagonal cyan→violet, same as the nav logo -->
    <linearGradient id="g" x1="0" y1="0" x2="52" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0A0A0F"/>

  <!-- LC monogram scaled to fit, centered -->
  <!-- Original viewBox 0 0 52 36 → scale 0.527 → 27.4×19, offset (2.3, 6.5) -->
  <g transform="translate(2.3 6.5) scale(0.527)">
    <!-- L: vertical bar + foot -->
    <rect x="2"  y="2"  width="5"  height="32" rx="2.5" fill="url(#g)"/>
    <rect x="2"  y="29" width="19" height="5"  rx="2.5" fill="url(#g)"/>
    <!-- C: top bar + left bar + bottom bar -->
    <rect x="26" y="2"  width="24" height="5"  rx="2.5" fill="url(#g)"/>
    <rect x="26" y="2"  width="5"  height="32" rx="2.5" fill="url(#g)"/>
    <rect x="26" y="29" width="24" height="5"  rx="2.5" fill="url(#g)"/>
  </g>
</svg>
